<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Lisbon Print House</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/shop.css">
<meta name="robots" content="noindex, nofollow">
</head>
<body>

<!-- Login Screen (shown until authenticated) -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="logo">Lisbon <span>Print House</span></div>
    <p>Admin Panel — sign in to continue</p>
    <div class="login-error" id="login-error"></div>
    <form id="login-form">
      <div class="form-group" style="text-align:left;">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="admin@lisbonprinthouse.com" required>
      </div>
      <div class="form-group" style="text-align:left;">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">Sign In</button>
    </form>
  </div>
</div>

<!-- Admin App (hidden until authenticated) -->
<div class="admin-layout" id="admin-app" style="display:none;">
  <aside class="admin-sidebar">
    <div class="sidebar-logo">Lisbon <span>Print House</span></div>
    <ul class="admin-nav">
      <li><a href="#" class="nav-link active" data-page="dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a></li>
      <li><a href="#" class="nav-link" data-page="products">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Products
      </a></li>
      <li><a href="#" class="nav-link" data-page="orders">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        Orders
      </a></li>
      <li><a href="#" class="nav-link" data-page="contacts">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        Enquiries
      </a></li>
      <li style="margin-top:auto;padding:16px 0 8px;">
        <a href="../index.html" style="color:rgba(255,255,255,0.5);font-size:0.82rem;padding:8px 20px;display:flex;gap:8px;text-decoration:none;">
          ← View Website
        </a>
      </li>
      <li>
        <a href="#" id="logout-btn" style="color:rgba(255,255,255,0.5);font-size:0.82rem;padding:8px 20px;display:flex;gap:8px;text-decoration:none;">
          Sign Out
        </a>
      </li>
    </ul>
  </aside>

  <main class="admin-main" id="admin-main">
    <!-- Page content injected here by JS -->
  </main>
</div>

<!-- Product Form Modal -->
<div class="form-modal-overlay" id="product-form-modal" hidden>
  <div class="form-modal-box">
    <h2 id="product-form-title">Add Product</h2>
    <form id="product-form">
      <input type="hidden" id="pf-id">
      <div class="form-row">
        <div class="form-group">
          <label>Name *</label>
          <input type="text" id="pf-name" required placeholder="Business Cards">
        </div>
        <div class="form-group">
          <label>Category *</label>
          <input type="text" id="pf-category" required placeholder="Cards">
        </div>
      </div>
      <div class="form-group">
        <label>Slug * (URL-safe, unique)</label>
        <input type="text" id="pf-slug" required placeholder="business-cards">
      </div>
      <div class="form-group">
        <label>Tagline</label>
        <input type="text" id="pf-tagline" placeholder="Short subtitle shown on card">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="pf-description" placeholder="Full product description…"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price From (€)</label>
          <input type="number" id="pf-price" step="0.01" min="0" placeholder="12.50">
        </div>
        <div class="form-group">
          <label>Price Unit</label>
          <input type="text" id="pf-price-unit" placeholder="/ 100 cards">
        </div>
      </div>
      <div class="form-group">
        <label>Image URL (Unsplash or your own)</label>
        <input type="url" id="pf-image" placeholder="https://images.unsplash.com/…">
      </div>
      <div class="form-group">
        <label>Stripe Payment Link URL</label>
        <input type="url" id="pf-stripe" placeholder="https://buy.stripe.com/…">
      </div>
      <div class="form-group">
        <label>Features (one per line)</label>
        <textarea id="pf-features" placeholder="350gsm card stock&#10;Double-sided printing&#10;48h turnaround"></textarea>
      </div>
      <div class="form-group">
        <label>Available Sizes (one per line)</label>
        <textarea id="pf-sizes" rows="3" placeholder="85×55mm (Standard)&#10;Custom sizes"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Sort Order</label>
          <input type="number" id="pf-sort" value="0" min="0">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="pf-active">
            <option value="true">Active (visible)</option>
            <option value="false">Inactive (hidden)</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-outline" id="product-form-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary" id="product-form-submit">Save Product</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
